buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

// The native Android SDK (`no.issuetracker:sdk`) is published to
// Maven Central, so no extra repository is needed at the consuming-
// app level. For pre-release testing against the local sdk-android
// tree, uncomment mavenLocal() and run from sdk-android:
//   ./gradlew :sdk:publishToMavenLocal
// allprojects {
//     repositories {
//         mavenLocal()
//     }
// }
